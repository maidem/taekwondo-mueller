name: Deploy to Mittwald

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      MITTWALD_API_TOKEN: ${{ secrets.MITTWALD_API_TOKEN }}
      DEPLOY_BRANCH: main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, intl, json, xml, curl, gd, pdo_mysql
          coverage: none

      - name: Validate composer.json / composer.lock
        run: composer validate --no-check-all --strict

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install Deployer
        run: composer require deployer/deployer --dev

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.TAEKWONDO_DEPLOYER_PRIVATE_KEY }}" > ~/.ssh/taekwondo-deployer
          chmod 600 ~/.ssh/taekwondo-deployer
          ssh-keyscan -H ssh.isenstedt.project.host >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH Connectivity
        run: ssh -i ~/.ssh/taekwondo-deployer -o BatchMode=yes -o StrictHostKeyChecking=yes maik.demuth@outlook.com@a-gzfyfw@ssh.isenstedt.project.host 'echo "Connected as $(whoami)"'

      - name: Deploy to Mittwald
        run: vendor/bin/dep deploy mittwald --branch=${{ env.DEPLOY_BRANCH }} --no-interaction -vvv
