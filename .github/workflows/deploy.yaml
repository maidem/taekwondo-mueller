name: Deploy to Live Server

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Deployer nutzt ggf. Tags/Releases

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, json, xml, curl, gd, pdo_mysql
          coverage: none

      # Prüft die composer.json im Backend-Projekt
      - name: Validate composer.json / composer.lock
        working-directory: portfolio-v2/backend
        run: composer validate --no-check-all --strict

      # Install mit Dev-Abhängigkeiten -> Deployer wird installiert
      - name: Install Composer dependencies
        working-directory: backend
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH_JSON }}
        run: |
          composer install \
            --no-progress \
            --no-interaction \
            --prefer-dist \
            --optimize-autoloader
          # KEIN --no-dev! Deployer liegt in require-dev.

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_deployer
          chmod 600 ~/.ssh/id_ed25519_deployer
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH Connectivity
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519_deployer -o BatchMode=yes -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" 'echo "Connected as $(whoami)"'

      - name: Deploy to Live Server (Deployer)
        working-directory: portfolio-v2/backend
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
        run: vendor/bin/dep deploy live --no-interaction -vvv
